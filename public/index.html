<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOMO Sydney — What's On</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f2;
  --surface: #ffffff;
  --surface2: #eeece9;
  --surface3: #e5e3de;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1a1917;
  --text2: #5a5754;
  --text3: #9c9894;
  --accent: #7c3aed;
  --accent-bg: #ede9fe;
  --hot: #dc2626;   --hot-bg: #fee2e2;
  --rising: #d97706; --rising-bg: #fef3c7;
  --steady: #16a34a; --steady-bg: #dcfce7;
  --gold: #f59e0b;   --silver: #94a3b8; --bronze: #b45309;
  --radius: 14px; --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111110; --surface: #1c1c1a; --surface2: #252523; --surface3: #2e2d2b;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
    --text: #f0ede8; --text2: #a09d98; --text3: #666;
    --accent: #a78bfa; --accent-bg: #2e1f5e;
    --hot: #f87171; --hot-bg: #450a0a;
    --rising: #fbbf24; --rising-bg: #451a03;
    --steady: #4ade80; --steady-bg: #052e16;
  }
}

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }

.layout { max-width: 860px; margin: 0 auto; padding: 0 1.25rem; }

/* ── Header ── */
.header { padding: 1.25rem 0 1rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; }
.header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon { width: 34px; height: 34px; border-radius: 9px; background: linear-gradient(135deg, #7c3aed, #db2777); display: flex; align-items: center; justify-content: center; }
.brand-icon i { font-size: 18px; color: #fff; }
.brand-name { font-size: 19px; font-weight: 700; letter-spacing: -0.4px; }
.brand-sub { font-size: 11px; color: var(--text3); }
.header-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text3); }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.refresh-btn { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 6px 12px; font-size: 13px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s; }
.refresh-btn:hover { background: var(--surface2); }
.refresh-btn.spinning i { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Summary chips ── */
.summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-bottom: 1.25rem; }
.summary-chip { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.chip-val { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
.chip-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ── Toolbar ── */
.toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; align-items: center; }
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--text3); }
.search-input { width: 100%; padding: 7px 10px 7px 32px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 13px; outline: none; }
.search-input:focus { border-color: var(--accent); }
.toolbar-select { padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; outline: none; }

/* ── Filters ── */
.filters { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 1.25rem; }
.filter-btn { font-size: 12px; padding: 5px 11px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; transition: all .12s; display: flex; align-items: center; gap: 4px; }
.filter-btn:hover { background: var(--surface2); }
.filter-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); font-weight: 500; }
.filter-btn .count { font-size: 10px; background: var(--surface2); border-radius: 10px; padding: 1px 5px; }

/* ══════════════════════════════════════════════════════
   LEADERBOARD — all full width
══════════════════════════════════════════════════════ */
.leaderboard { display: flex; flex-direction: column; gap: 10px; }
.lb-hero     { display: flex; flex-direction: column; gap: 10px; }
.lb-featured { display: flex; flex-direction: column; gap: 8px; }
.lb-list     { display: flex; flex-direction: column; gap: 5px; }

/* ── Cards ── */
.event-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .15s, transform .15s, box-shadow .15s;
  position: relative;
  cursor: default;
}
.event-card:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,.06); }

/* Hero card — full width, large landscape image */
.event-card.card-hero { display: flex; min-height: 240px; }
.event-card.card-hero .card-image-wrap { width: 300px; min-height: 240px; flex-shrink: 0; overflow: hidden; }
.event-card.card-hero .card-image { width: 100%; height: 100%; object-fit: cover; display: block; }
.event-card.card-hero .card-image-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--surface2); }
.event-card.card-hero .card-image-placeholder i { font-size: 48px; color: var(--text3); }
.event-card.card-hero .card-body { flex: 1; padding: 22px 26px; display: flex; flex-direction: column; gap: 10px; }

/* Featured card — full width, medium horizontal */
.event-card.card-featured { display: flex; min-height: 140px; }
.event-card.card-featured .card-image-wrap { width: 180px; min-height: 140px; flex-shrink: 0; overflow: hidden; }
.event-card.card-featured .card-image { width: 100%; height: 100%; object-fit: cover; display: block; }
.event-card.card-featured .card-image-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--surface2); }
.event-card.card-featured .card-image-placeholder i { font-size: 32px; color: var(--text3); }
.event-card.card-featured .card-body { flex: 1; padding: 14px 18px; display: flex; flex-direction: column; gap: 6px; }

/* List card — full width, compact with thumbnail */
.event-card.card-list { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: var(--radius-sm); }
.card-list .card-thumb { width: 52px; height: 52px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.card-list .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-list .card-thumb-placeholder { width: 52px; height: 52px; background: var(--surface2); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card-list .card-thumb-placeholder i { font-size: 18px; color: var(--text3); }
.event-card.card-list .card-body { flex: 1; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; min-width: 0; }

/* ── Rank badge ── */
.rank-badge {
  position: absolute; top: 10px; left: 10px;
  min-width: 28px; height: 28px; border-radius: 8px;
  font-size: 13px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  padding: 0 6px; z-index: 2; letter-spacing: -0.5px;
  box-shadow: 0 1px 4px rgba(0,0,0,.25);
}
.rank-1  { background: #f59e0b; color: #000; font-size: 14px; }
.rank-2  { background: #94a3b8; color: #fff; }
.rank-3  { background: #b45309; color: #fff; }
.rank-n  { background: var(--surface2); color: var(--text2); font-size: 11px; }
.card-hero .rank-badge { width: 40px; height: 40px; font-size: 18px; border-radius: 10px; top: 14px; left: 14px; }
.card-list .rank-badge { position: static; flex-shrink: 0; }

/* ── Score ring ── */
.score-ring {
  width: 52px; height: 52px; flex-shrink: 0;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800;
  background: conic-gradient(var(--ring-color, var(--accent)) calc(var(--pct, 0) * 1%), var(--surface2) 0%);
  position: relative;
}
.score-ring::after { content: ''; position: absolute; inset: 6px; border-radius: 50%; background: var(--surface); }
.score-ring span { position: relative; z-index: 1; color: var(--text); }
.score-ring-sm { width: 40px; height: 40px; font-size: 13px; }
.score-ring-sm::after { inset: 5px; }
.score-label { font-size: 10px; color: var(--text3); margin-top: 1px; text-align: center; }

/* ── Signal pills ── */
.signals { display: flex; flex-wrap: wrap; gap: 5px; margin: 2px 0; }
.signal { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--surface2); color: var(--text2); display: inline-flex; align-items: center; gap: 3px; border: 0.5px solid var(--border); }
.signal i { font-size: 11px; }
.signal.sig-hot     { background: var(--hot-bg); color: var(--hot); border-color: transparent; }
.signal.sig-reddit  { background: #fff0e8; color: #c2410c; border-color: transparent; }
.signal.sig-new     { background: var(--accent-bg); color: var(--accent); border-color: transparent; }
.signal.sig-spotify { background: #e8faf0; color: #15803d; border-color: transparent; }
.signal.sig-lastfm  { background: #fef2f2; color: #b91c1c; border-color: transparent; }

/* ── Event name ── */
.event-name { font-weight: 700; color: var(--text); line-height: 1.3; }
.event-name a { color: inherit; text-decoration: none; }
.event-name a:hover { color: var(--accent); }
.card-hero .event-name     { font-size: 22px; }
.card-featured .event-name { font-size: 16px; }
.card-list .event-name     { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 340px; }

/* ── Badges ── */
.badges { display: flex; flex-wrap: wrap; gap: 4px; margin: 3px 0; }
.badge { font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 500; display: inline-flex; align-items: center; gap: 3px; }
.badge i { font-size: 10px; }
.badge-cat-music   { background: #ede9fe; color: #5b21b6; }
.badge-cat-food    { background: #fef3c7; color: #92400e; }
.badge-cat-art     { background: #fce7f3; color: #9d174d; }
.badge-cat-market  { background: #e0f2fe; color: #0c4a6e; }
.badge-cat-film    { background: #f3e8ff; color: #6b21a8; }
.badge-cat-culture { background: #ffedd5; color: #7c2d12; }
.badge-hot    { background: var(--hot-bg); color: var(--hot); }
.badge-rising { background: var(--rising-bg); color: var(--rising); }
.badge-steady { background: var(--steady-bg); color: var(--steady); }
.badge-free   { background: #f0fdf4; color: #15803d; }
.badge-source { background: var(--surface2); color: var(--text3); font-size: 10px; }

/* ── Meta items ── */
.card-meta { display: flex; flex-wrap: wrap; gap: 4px 14px; font-size: 12px; color: var(--text2); margin: 2px 0; }
.meta-item { display: flex; align-items: center; gap: 4px; }
.meta-item i { font-size: 12px; color: var(--text3); flex-shrink: 0; }

/* ── Score bar ── */
.score-bar-wrap { margin: 4px 0; }
.score-bar-header { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); margin-bottom: 3px; }
.score-bar-bg { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }

/* ── Source tags ── */
.card-sources { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }

/* ── Source panel ── */
.source-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
.source-panel-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.source-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 5px; }
.source-item { font-size: 11px; display: flex; align-items: center; gap: 5px; padding: 4px 8px; border-radius: 6px; background: var(--surface2); color: var(--text2); }
.source-item.ok i { color: #22c55e; }
.source-item.fail i { color: var(--hot); }
.source-item.pending i { color: var(--text3); }
.toggle-sources { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 5px 10px; font-size: 12px; color: var(--text3); cursor: pointer; display: flex; align-items: center; gap: 5px; }
.toggle-sources:hover { background: var(--surface2); }

/* ── Empty / loading ── */
.empty { text-align: center; padding: 3rem 1rem; color: var(--text3); }
.empty i { font-size: 36px; display: block; margin-bottom: 12px; }
.empty p { font-size: 14px; }
.loading-grid { display: flex; flex-direction: column; gap: 10px; }
.skeleton { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); height: 140px; overflow: hidden; position: relative; }
.skeleton:first-child { height: 240px; }
.skeleton::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg,transparent 0%,var(--surface2) 50%,transparent 100%); animation: shimmer 1.4s infinite; }
@keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

/* ── Section labels ── */
.lb-section-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin: 14px 0 7px; display: flex; align-items: center; gap: 6px; }
.lb-section-label::after { content:''; flex:1; height:0.5px; background: var(--border2); }

/* ── Rank change flash ── */
@keyframes flash-up { 0%{background:rgba(34,197,94,.15)} 100%{background:transparent} }
@keyframes flash-down { 0%{background:rgba(239,68,68,.1)} 100%{background:transparent} }
.rank-up   { animation: flash-up   .8s ease; }
.rank-down { animation: flash-down .8s ease; }

/* ── Footer ── */
.footer { text-align: center; padding: 2rem 0; font-size: 12px; color: var(--text3); border-top: 0.5px solid var(--border); margin-top: 2rem; }

@media (max-width: 640px) {
  .event-card.card-hero { flex-direction: column; }
  .event-card.card-hero .card-image-wrap { width: 100%; height: 200px; }
  .event-card.card-featured { flex-direction: column; }
  .event-card.card-featured .card-image-wrap { width: 100%; height: 160px; }
  .summary-row { grid-template-columns: repeat(3, 1fr); }
  .card-list .event-name { max-width: 180px; }
}
</style>
</head>
<body>
<div class="layout">

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon"><i class="ti ti-map-pin"></i></div>
        <div>
          <div class="brand-name">FOMO Sydney</div>
          <div class="brand-sub">Trending events · art, music, culture, food</div>
        </div>
      </div>
      <div class="header-meta">
        <span id="last-updated"><span class="live-dot"></span>Loading…</span>
        <button class="toggle-sources" id="toggle-sources-btn" aria-expanded="false">
          <i class="ti ti-server"></i>
          <span id="source-count">— sources</span>
        </button>
        <button class="refresh-btn" id="refresh-btn">
          <i class="ti ti-refresh"></i>Refresh
        </button>
      </div>
    </div>
  </header>

  <!-- Source panel -->
  <div class="source-panel" id="source-panel" style="display:none">
    <div class="source-panel-title">
      <i class="ti ti-plug"></i>Source status
      <span id="sources-ok-count" style="margin-left:auto;font-weight:400;color:var(--text3)"></span>
    </div>
    <div class="source-grid" id="source-grid"></div>
  </div>

  <!-- Summary -->
  <div class="summary-row" id="summary-row">
    <div class="summary-chip"><div class="chip-val" id="s-total">—</div><div class="chip-lbl">events found</div></div>
    <div class="summary-chip"><div class="chip-val" id="s-talking">—</div><div class="chip-lbl">people talking</div></div>
    <div class="summary-chip"><div class="chip-val" id="s-hot">—</div><div class="chip-lbl">trending hot</div></div>
    <div class="summary-chip"><div class="chip-val" id="s-weekend">—</div><div class="chip-lbl">this week</div></div>
    <div class="summary-chip"><div class="chip-val" id="s-free">—</div><div class="chip-lbl">free events</div></div>
    <div class="summary-chip"><div class="chip-val" id="s-sources">—</div><div class="chip-lbl">sources live</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input class="search-input" type="search" id="search-input" placeholder="Search events, venues, suburbs…">
    </div>
    <select class="toolbar-select" id="sort-select">
      <option value="trend">Sort: Trending</option>
      <option value="talking">Sort: Most talked about</option>
      <option value="date">Sort: Upcoming first</option>
    </select>
    <select class="toolbar-select" id="suburb-select">
      <option value="">All suburbs</option>
    </select>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">All <span class="count" id="cnt-all">…</span></button>
    <button class="filter-btn" data-cat="music"><i class="ti ti-music"></i>Music <span class="count" id="cnt-music">0</span></button>
    <button class="filter-btn" data-cat="food"><i class="ti ti-chef-hat"></i>Food &amp; drink <span class="count" id="cnt-food">0</span></button>
    <button class="filter-btn" data-cat="art"><i class="ti ti-palette"></i>Art <span class="count" id="cnt-art">0</span></button>
    <button class="filter-btn" data-cat="market"><i class="ti ti-building-store"></i>Markets <span class="count" id="cnt-market">0</span></button>
    <button class="filter-btn" data-cat="film"><i class="ti ti-movie"></i>Film <span class="count" id="cnt-film">0</span></button>
    <button class="filter-btn" data-cat="culture"><i class="ti ti-masks-theater"></i>Culture <span class="count" id="cnt-culture">0</span></button>
  </div>

  <!-- Leaderboard -->
  <div id="events-container">
    <div class="loading-grid" id="loading-grid">
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div>
    </div>
    <div id="leaderboard-wrap" style="display:none"></div>
    <div class="empty" id="empty-state" style="display:none">
      <i class="ti ti-calendar-off"></i>
      <p id="empty-msg">No events found.</p>
    </div>
  </div>

  <footer class="footer">
    FOMO Sydney · Trending art, music, culture &amp; food events · 150+ sources · Refreshes every 6 hours
  </footer>
</div>

<script>
const API = '';
let state = {
  allEvents: [], cat: 'all', sort: 'trend', search: '', suburb: '',
  stats: null, sources: [], sourcePanelOpen: false,
  prevRanks: new Map(),
};

// ── Fetch ──────────────────────────────────────────────────────────────────────
async function fetchStats()  { try { return await (await fetch(`${API}/api/stats`)).json(); } catch { return null; } }
async function fetchSources(){ try { return (await (await fetch(`${API}/api/sources`)).json()).sources || []; } catch { return []; } }
async function fetchEvents() {
  const p = new URLSearchParams({ sort: state.sort, limit: 200 });
  if (state.cat !== 'all') p.set('category', state.cat);
  if (state.search) p.set('q', state.search);
  if (state.suburb) p.set('suburb', state.suburb);
  try { return await (await fetch(`${API}/api/events?${p}`)).json(); } catch { return { events: [], total: 0 }; }
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function decodeHtml(s) { const t = document.createElement('textarea'); t.innerHTML = s; return t.value; }
function esc(s) { const d = decodeHtml(String(s||'')); return d.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtDate(ev) {
  const d = ev.date?.display || ev.date?.start;
  if (!d) return '';
  try {
    const opts = { weekday:'short', day:'numeric', month:'long' };
    if (typeof d === 'string' && d.length <= 12)
      return new Date(d + 'T00:00:00').toLocaleDateString('en-AU', opts);
    return new Date(d).toLocaleDateString('en-AU', opts);
  } catch { return d; }
}

function fmtNum(n) {
  if (!n || n === 0) return null;
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000)    return (n/1000).toFixed(1)+'k';
  return String(n);
}

function catBadge(cat) {
  const icons  = { music:'ti-music', food:'ti-chef-hat', art:'ti-palette', market:'ti-building-store', film:'ti-movie', culture:'ti-masks-theater' };
  const labels = { music:'Music', food:'Food & drink', art:'Art', market:'Markets', film:'Film', culture:'Culture' };
  return `<span class="badge badge-cat-${esc(cat)}"><i class="ti ${icons[cat]||'ti-tag'}"></i>${labels[cat]||cat}</span>`;
}

function trendBadge(level, label) {
  const icons = { hot:'ti-flame', rising:'ti-trending-up', steady:'ti-minus' };
  return `<span class="badge badge-${level}"><i class="ti ${icons[level]||'ti-minus'}"></i>${esc(label||level)}</span>`;
}

function rankBadge(rank, cls='') {
  const rankCls = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'rank-n';
  const icon    = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':null;
  return `<div class="rank-badge ${rankCls} ${cls}">${icon||`#${rank}`}</div>`;
}

function scoreRing(score, size='') {
  const pct   = Math.max(0, Math.min(100, score || 0));
  const color = pct >= 70 ? '#16a34a' : pct >= 45 ? '#d97706' : '#6b7280';
  return `<div class="score-ring ${size}" style="--pct:${pct};--ring-color:${color}"><span>${pct}</span></div>`;
}

function signalPills(ev) {
  const sig    = ev.rawSignals || {};
  const srcs   = ev.sourceCount || new Set((ev.sources||[]).map(s=>s.name)).size;
  const talk   = fmtNum(ev.talkingCount);
  const reddit = sig.redditMentions || 0;
  const vel    = ev.velocityScore;
  const rsvp   = fmtNum(sig.rsvpCount);
  const spotifyPop  = sig.spotifyPopularity || 0;
  const lastfmList  = sig.lastfmListeners   || 0;
  const wikiViews   = sig.wikiMonthlyViews  || 0;

  let pills = `<span class="signal"><i class="ti ti-database"></i>${srcs} source${srcs!==1?'s':''}</span>`;
  if (spotifyPop >= 50) pills += `<span class="signal sig-spotify"><i class="ti ti-brand-spotify"></i>${spotifyPop} popularity</span>`;
  if (lastfmList >= 50000) {
    const fmt = lastfmList >= 1000000 ? `${(lastfmList/1000000).toFixed(1)}M` : `${Math.round(lastfmList/1000)}k`;
    pills += `<span class="signal sig-lastfm"><i class="ti ti-headphones"></i>${fmt} listeners</span>`;
  }
  if (reddit > 0) pills += `<span class="signal sig-reddit"><i class="ti ti-brand-reddit"></i>${reddit} Reddit</span>`;
  if (talk)   pills += `<span class="signal"><i class="ti ti-users"></i>${talk} talking</span>`;
  if (rsvp)   pills += `<span class="signal"><i class="ti ti-calendar-check"></i>${rsvp} going</span>`;
  if (vel > 0.4 && spotifyPop < 50 && lastfmList < 50000) pills += `<span class="signal sig-new"><i class="ti ti-trending-up"></i>Trending</span>`;
  return `<div class="signals">${pills}</div>`;
}

function sourceTags(ev) {
  const names = [...new Set((ev.sources||[]).map(s=>s.name))].slice(0,4);
  return names.map(n=>`<span class="badge badge-source">${esc(n)}</span>`).join('');
}

function validImg(url) {
  return url && typeof url === 'string' && (url.startsWith('http://') || url.startsWith('https://'));
}

function imgOrPlaceholder(imageUrl, cls) {
  if (validImg(imageUrl)) {
    return `<img class="card-image" src="${esc(imageUrl)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=card-image-placeholder><i class=\\'ti ti-calendar-event\\'></i></div>'">`;
  }
  return `<div class="card-image-placeholder"><i class="ti ti-calendar-event"></i></div>`;
}

// ── Card renderers ─────────────────────────────────────────────────────────────

function heroCard(ev) {
  const date = fmtDate(ev);
  const loc  = [ev.location?.suburb, ev.location?.name].filter(Boolean).join(' · ');
  const host = (ev.hosts||[]).slice(0,2).join(', ');

  return `<article class="event-card card-hero" data-id="${esc(ev.id)}" data-rank="${ev.socialRank}">
    ${rankBadge(ev.socialRank)}
    <div class="card-image-wrap">${imgOrPlaceholder(ev.imageUrl)}</div>
    <div class="card-body">
      <div style="display:flex;align-items:flex-start;gap:14px">
        <div style="flex:1">
          <h2 class="event-name">
            ${ev.url ? `<a href="${esc(ev.url)}" target="_blank" rel="noopener">${esc(ev.name)}</a>` : esc(ev.name)}
          </h2>
          <div class="badges" style="margin-top:6px">${catBadge(ev.category)}${trendBadge(ev.trendLevel, ev.trendLabel)}</div>
        </div>
        <div style="text-align:center;flex-shrink:0">
          ${scoreRing(ev.socialScore)}
          <div class="score-label">Trending</div>
        </div>
      </div>
      ${signalPills(ev)}
      <div class="card-meta">
        ${date ? `<div class="meta-item"><i class="ti ti-calendar"></i>${esc(date)}</div>` : ''}
        ${loc  ? `<div class="meta-item"><i class="ti ti-map-pin"></i>${esc(loc)}</div>` : ''}
        ${host ? `<div class="meta-item"><i class="ti ti-user"></i>${esc(host)}</div>` : ''}
        ${ev.isFree ? `<div class="meta-item"><i class="ti ti-ticket"></i>Free</div>` : ''}
      </div>
      <div class="card-sources">${sourceTags(ev)}</div>
    </div>
  </article>`;
}

function featuredCard(ev) {
  const date = fmtDate(ev);
  const loc  = [ev.location?.suburb, ev.location?.name].filter(Boolean).join(' · ');

  return `<article class="event-card card-featured" data-id="${esc(ev.id)}" data-rank="${ev.socialRank}">
    ${rankBadge(ev.socialRank)}
    <div class="card-image-wrap">${imgOrPlaceholder(ev.imageUrl)}</div>
    <div class="card-body">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="flex:1">
          <h2 class="event-name">
            ${ev.url ? `<a href="${esc(ev.url)}" target="_blank" rel="noopener">${esc(ev.name)}</a>` : esc(ev.name)}
          </h2>
          <div class="badges" style="margin-top:4px">${catBadge(ev.category)}${trendBadge(ev.trendLevel, ev.trendLabel)}</div>
        </div>
        <div style="text-align:center;flex-shrink:0">
          ${scoreRing(ev.socialScore,'score-ring-sm')}
          <div class="score-label">Trending</div>
        </div>
      </div>
      ${signalPills(ev)}
      <div class="card-meta">
        ${date ? `<div class="meta-item"><i class="ti ti-calendar"></i>${esc(date)}</div>` : ''}
        ${loc  ? `<div class="meta-item"><i class="ti ti-map-pin"></i>${esc(loc)}</div>` : ''}
      </div>
      <div class="card-sources">${sourceTags(ev)}</div>
    </div>
  </article>`;
}

function listRow(ev) {
  const date = fmtDate(ev);
  const pct  = ev.socialScore || 0;
  const color= pct>=70?'#16a34a':pct>=45?'#d97706':'#6b7280';
  const thumb = validImg(ev.imageUrl)
    ? `<div class="card-thumb"><img src="${esc(ev.imageUrl)}" alt="" loading="lazy" onerror="this.parentNode.outerHTML='<div class=card-thumb-placeholder><i class=\\'ti ti-calendar-event\\'></i></div>'"></div>`
    : `<div class="card-thumb-placeholder"><i class="ti ti-calendar-event"></i></div>`;

  return `<article class="event-card card-list" data-id="${esc(ev.id)}" data-rank="${ev.socialRank}">
    ${rankBadge(ev.socialRank, '')}
    ${thumb}
    <div class="card-body">
      <h2 class="event-name">
        ${ev.url ? `<a href="${esc(ev.url)}" target="_blank" rel="noopener">${esc(ev.name)}</a>` : esc(ev.name)}
      </h2>
      <div class="badges" style="flex-shrink:0">${catBadge(ev.category)}</div>
      ${date ? `<div class="meta-item" style="flex-shrink:0;font-size:12px;color:var(--text2)"><i class="ti ti-calendar" style="font-size:12px;color:var(--text3)"></i>${esc(date)}</div>` : ''}
    </div>
    <div style="flex-shrink:0;font-size:13px;font-weight:700;color:${color};min-width:30px;text-align:right">${pct}</div>
  </article>`;
}

// ── Leaderboard render ─────────────────────────────────────────────────────────
function renderLeaderboard(events) {
  events.forEach((ev, i) => {
    if (!ev.socialScore) ev.socialScore = ev.trendScore || 0;
    if (!ev.socialRank)  ev.socialRank  = i + 1;
  });
  const wrap    = document.getElementById('leaderboard-wrap');
  const empty   = document.getElementById('empty-state');
  const loading = document.getElementById('loading-grid');

  loading.style.display = 'none';

  if (!events.length) {
    wrap.style.display = 'none';
    empty.style.display = 'block';
    document.getElementById('empty-msg').textContent =
      state.search ? `No events matching "${state.search}"` : 'No events yet — the crawler may still be running. Try refreshing in a minute.';
    return;
  }

  empty.style.display = 'none';
  wrap.style.display = 'block';

  const prevRanks = new Map();
  wrap.querySelectorAll('[data-id]').forEach(el => {
    prevRanks.set(el.dataset.id, parseInt(el.dataset.rank) || 999);
  });

  const hero     = events.slice(0, 1);
  const featured = events.slice(1, 5);
  const list     = events.slice(5);

  let html = '<div class="leaderboard">';

  if (hero.length) {
    html += `<div class="lb-section-label"><i class="ti ti-trophy" style="color:var(--gold)"></i>#1 Trending</div>`;
    html += `<div class="lb-hero">${hero.map(heroCard).join('')}</div>`;
  }
  if (featured.length) {
    html += `<div class="lb-section-label"><i class="ti ti-flame" style="color:var(--hot)"></i>Top 5</div>`;
    html += `<div class="lb-featured">${featured.map(featuredCard).join('')}</div>`;
  }
  if (list.length) {
    html += `<div class="lb-section-label"><i class="ti ti-list"></i>All events</div>`;
    html += `<div class="lb-list">${list.map(listRow).join('')}</div>`;
  }
  html += '</div>';

  wrap.innerHTML = html;

  if (prevRanks.size > 0) {
    wrap.querySelectorAll('[data-id]').forEach(el => {
      const prev = prevRanks.get(el.dataset.id);
      const curr = parseInt(el.dataset.rank);
      if (prev && prev !== curr) {
        el.classList.add(curr < prev ? 'rank-up' : 'rank-down');
        setTimeout(() => el.classList.remove('rank-up','rank-down'), 900);
      }
    });
  }
}

// ── Stats render ───────────────────────────────────────────────────────────────
function renderStats(stats, updatedAt) {
  if (stats) {
    document.getElementById('s-total').textContent    = (stats.totalEvents||0).toLocaleString();
    document.getElementById('s-talking').textContent  = fmtNum(stats.totalTalking) || '0';
    document.getElementById('s-hot').textContent      = (stats.hotCount||0).toLocaleString();
    document.getElementById('s-weekend').textContent  = (stats.thisWeekend||0).toLocaleString();
    document.getElementById('s-free').textContent     = (stats.freeCount||0).toLocaleString();
    document.getElementById('s-sources').textContent  = `${stats.sources?.ok||0}/${stats.sources?.total||'—'}`;
    const cats = stats.categories||{};
    document.getElementById('cnt-all').textContent = stats.totalEvents||0;
    ['music','food','art','market','film','culture'].forEach(c=>{
      const el = document.getElementById(`cnt-${c}`);
      if (el) el.textContent = cats[c]||0;
    });
    if (stats.topSuburbs?.length) {
      const sel = document.getElementById('suburb-select');
      while (sel.options.length > 1) sel.remove(1);
      stats.topSuburbs.forEach(([s]) => {
        const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
      });
    }
  }
  if (updatedAt) {
    const diff = Math.round((Date.now() - new Date(updatedAt)) / 60000);
    const label = diff < 1 ? 'just now' : diff < 60 ? `${diff}m ago` : `${Math.round(diff/60)}h ago`;
    document.getElementById('last-updated').innerHTML = `<span class="live-dot"></span>Updated ${label}`;
  }
}

function renderSources(sources) {
  const ok = sources.filter(s=>s.ok).length;
  document.getElementById('sources-ok-count').textContent = `${ok}/${sources.length} live`;
  document.getElementById('source-count').textContent = `${sources.length} sources`;
  document.getElementById('source-grid').innerHTML = sources.map(s => {
    const cls  = s.ok?'ok':(s.ok===false?'fail':'pending');
    const icon = s.ok?'ti-check':(s.ok===false?'ti-x':'ti-clock');
    return `<div class="source-item ${cls}"><i class="ti ${icon}"></i>${esc(s.name)}${s.count!=null?` (${s.count})`:''}</div>`;
  }).join('');
}

// ── Load ───────────────────────────────────────────────────────────────────────
async function load(showLoading = true) {
  if (showLoading) {
    document.getElementById('loading-grid').style.display = 'flex';
    document.getElementById('leaderboard-wrap').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';
  }
  const [evData, stats, sources] = await Promise.all([fetchEvents(), fetchStats(), fetchSources()]);
  state.allEvents = evData.events || [];
  state.stats = stats;
  state.sources = sources;
  renderStats(stats, evData.updatedAt);
  renderLeaderboard(state.allEvents);
  if (sources.length) renderSources(sources);
}

// ── Event listeners ────────────────────────────────────────────────────────────
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-cat]'); if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); state.cat = btn.dataset.cat; load(false);
});
document.getElementById('sort-select').addEventListener('change', e => { state.sort = e.target.value; load(false); });
document.getElementById('suburb-select').addEventListener('change', e => { state.suburb = e.target.value; load(false); });
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.search = e.target.value.trim(); load(false); }, 300);
});
document.getElementById('refresh-btn').addEventListener('click', async () => {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try {
    await fetch(`${API}/api/crawl`, { method:'POST' });
    await new Promise(r => setTimeout(r, 2000));
    await load(true);
  } finally {
    btn.classList.remove('spinning');
  }
});
document.getElementById('toggle-sources-btn').addEventListener('click', () => {
  state.sourcePanelOpen = !state.sourcePanelOpen;
  document.getElementById('source-panel').style.display = state.sourcePanelOpen ? 'block' : 'none';
  document.getElementById('toggle-sources-btn').setAttribute('aria-expanded', state.sourcePanelOpen);
  if (state.sourcePanelOpen && state.sources.length) renderSources(state.sources);
});

setInterval(() => load(false), 5 * 60 * 1000);
load();
</script>
</body>
</html>
