[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Scheduled background crawl — every 6 hours
[functions."scheduled-crawl-background"]
  schedule = "0 */6 * * *"

# Use node_modules bundling for functions that do heavy scraping
# (esbuild tree-shaking can break dynamic requires in cheerio/axios)
[functions."crawl-background"]
  node_bundler = "zisi"

[functions."scheduled-crawl-background"]
  node_bundler = "zisi"

[functions."deploy-succeeded-background"]
  node_bundler = "zisi"

# API route rewrites → Netlify Functions
[[redirects]]
  from = "/api/events"
  to = "/.netlify/functions/events"
  status = 200

[[redirects]]
  from = "/api/stats"
  to = "/.netlify/functions/stats"
  status = 200

[[redirects]]
  from = "/api/sources"
  to = "/.netlify/functions/sources"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/crawl"
  to = "/.netlify/functions/crawl-background"
  status = 200
  force = true
